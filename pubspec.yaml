# Basic package information for the Flutter app.
name: mycrm
description: "A new Flutter CRM project."
publish_to: 'none'

# App version shown in release builds.
version: 1.0.0+1

# Minimum Dart SDK required for this project.
environment:
  sdk: ^3.9.2

# Packages used by the app at runtime.
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  get: ^4.7.3
  dio: ^5.9.2
  shared_preferences: ^2.5.5
  flutter_svg: ^2.2.4
  google_fonts: ^8.0.2
  image_picker: ^1.2.1
  file_picker: ^10.1.9
  permission_handler: ^12.0.1
  provider: ^6.1.5
  country_state_city_selector: ^1.0.6
  flutter_html: ^3.0.0
# Packages used only during development and testing.
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# Flutter-specific configuration such as bundled assets.
flutter:
  uses-material-design: true
  assets:
    # Bundle the full assets folder so renamed images are picked up consistently.
    - assets/
