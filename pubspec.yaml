# Basic package information for the Flutter app.
name: mycrm
description: "CRM app for leads, projects, staff, and renewals."
publish_to: 'none'

# App version shown in release builds.
version: 1.0.0+4

# Minimum Dart SDK required for this project.
environment:
  sdk: ^3.9.2

# Packages used by the app at runtime.
dependencies:
  flutter:
    sdk: flutter  
  get: ^4.7.3
  dio: ^5.9.2
  flutter_secure_storage: ^10.3.1
  local_auth: ^2.3.0
  google_fonts: ^8.0.2
  image_picker: ^1.2.1
  file_picker:  ^10.1.9
  permission_handler: ^12.0.1
  provider: ^6.1.5
  skeletonizer: ^2.1.0  
  shimmer: ^3.0.0
  country_state_city_selector: ^1.0.6
  flutter_html: ^3.0.0
  flutter_markdown: ^0.7.4
  url_launcher: ^6.3.1
  syncfusion_flutter_pdfviewer: ^33.2.8
  open_file: ^3.5.10
  path_provider: ^2.1.5
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  device_info_plus: ^12.4.0
  font_awesome_flutter: ^11.0.0
  shared_preferences: ^2.5.3
  fl_chart: ^0.68.0
  flutter_tts: ^4.2.5

# Packages used only during development and testing.
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# Flutter-specific configuration such as bundled assets.
flutter:
  uses-material-design: true
  assets:
    # Bundle the full assets folder so renamed images are picked up consistently.
    - assets/logo1.png
    - assets/logo.png
    - assets/icon.png
    - PRIVACY_POLICY.md
    - TERMS_AND_CONDITIONS.md

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/applogo.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/applogo.png"
