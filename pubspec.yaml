# Basic package information for the Flutter app.
name: mycrm
description: "A new Flutter CRM project."
publish_to: 'none'

# App version shown in release builds.
version: 1.0.0+1

# Minimum Dart SDK required for this project.
environment:
  sdk: ^3.9.2

# Packages used by the app at runtime.
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  get: ^4.7.3
  dio: ^5.9.2
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0
  flutter_svg: ^2.2.4
  google_fonts: ^8.0.2
  image_picker: ^1.2.1
  file_picker: ^10.1.9
  permission_handler: ^12.0.1
  provider: ^6.1.5
  country_state_city_selector: ^1.0.6
  flutter_html: ^3.0.0
  url_launcher: ^6.3.1
  syncfusion_flutter_pdfviewer: ^27.2.5
  open_file: ^3.5.10
  path_provider: ^2.1.5

# Packages used only during development and testing.
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

# Flutter-specific configuration such as bundled assets.
flutter:
  uses-material-design: true
  assets:
    # Bundle the full assets folder so renamed images are picked up consistently.
    - assets/logo1.png
    - assets/logo.png
    - assets/icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon.png"
